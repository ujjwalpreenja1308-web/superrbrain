<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in - Covable</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/styles/base.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Video background */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Wordmark top-left */
    .auth-wordmark {
      position: fixed;
      top: 32px;
      left: 32px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      opacity: 1;
      transition: opacity 150ms ease;
    }
    .auth-wordmark:hover { opacity: 0.65; }
    .auth-wordmark span {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.9);
    }

    /* Right panel */
    .auth-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: 100%;
      max-width: 420px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px 40px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-left: 1px solid rgba(255,255,255,0.08);
    }

    .auth-heading { margin-bottom: 32px; }
    .auth-heading h1 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .auth-heading p {
      margin-top: 6px;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.5;
    }

    /* Google button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.88);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 140ms, border-color 140ms, transform 80ms;
    }
    .btn-google:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
    .btn-google:active { transform: scale(0.98); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .auth-divider span {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
    }

    /* Form */
    .auth-form { display: flex; flex-direction: column; gap: 10px; }

    .auth-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 140ms;
    }
    .auth-input::placeholder { color: rgba(255,255,255,0.28); }
    .auth-input:focus { border-color: rgba(255,255,255,0.4); }

    .auth-error {
      display: none;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.1);
      color: #f87171;
      font-size: 12px;
      line-height: 1.4;
    }

    .btn-submit {
      width: 100%;
      padding: 11px 16px;
      border-radius: 8px;
      border: none;
      background: #fff;
      color: #000;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 140ms, transform 80ms;
      margin-top: 2px;
    }
    .btn-submit:hover { background: rgba(255,255,255,0.88); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Toggle sign-in / sign-up */
    .auth-toggle {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.38);
    }
    .auth-toggle a {
      color: rgba(255,255,255,0.65);
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
    }
    .auth-toggle a:hover { color: #fff; }

    /* Footer */
    .auth-footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.25);
      border-top-color: #000;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    .spinner-white {
      border-color: rgba(255,255,255,0.25);
      border-top-color: rgba(255,255,255,0.85);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      #bg-video { display: none; }
      body { background: #000; }
      .auth-panel {
        max-width: 100%;
        border-left: none;
        background: #000;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
    }
  </style>
</head>
<body>

<video id="bg-video" src="https://dguoezeskkmcvutgcrzn.supabase.co/storage/v1/object/sign/assets/ascii-animation.mp4?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8xNGUyMGE4Yi0zOGU0LTQ3MjEtYTU5NC1jMGEzYzNmNTc0NjQiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJhc3NldHMvYXNjaWktYW5pbWF0aW9uLm1wNCIsImlhdCI6MTc3NjU0MTk5NSwiZXhwIjoxODA4MDc3OTk1fQ.uA_isI6iUxToc4VPhJruPwJYYspWOahbcFdKWIMXhUs" autoplay loop muted playsinline></video>

<a href="https://covable.app" class="auth-wordmark">
  <img src="/logo.svg" alt="" width="22" height="22" />
  <span>Covable</span>
</a>

<div class="auth-panel">
  <div class="auth-heading">
    <h1 id="auth-title">Welcome back</h1>
    <p id="auth-subtitle">Sign in to your Covable dashboard.</p>
  </div>

  <button class="btn-google" id="btn-google" type="button">
    <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    <span id="google-label">Continue with Google</span>
  </button>

  <div class="auth-divider"><span>or</span></div>

  <form class="auth-form" id="auth-form" novalidate>
    <input class="auth-input" type="email" id="input-email" placeholder="Email address" autocomplete="email" required />
    <input class="auth-input" type="password" id="input-password" placeholder="Password" autocomplete="current-password" required minlength="6" />
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-submit" type="submit" id="btn-submit">Sign In</button>
  </form>

  <p class="auth-toggle" id="auth-toggle">
    Don't have an account? <a id="toggle-link">Sign up</a>
  </p>

  <p class="auth-footer">© <span id="year"></span> Covable. All rights reserved.</p>
</div>

<script type="module">
  // Injected at build time via vite.config.js define
  const SUPABASE_URL = __SUPABASE_URL__;
  const SUPABASE_ANON_KEY = __SUPABASE_KEY__;
  const HOME_URL = "https://home.covable.app";

  // Cookie helpers — same as frontend/src/lib/supabase.ts
  const COOKIE_NAME = "covable-auth";
  const COOKIE_DOMAIN = ".covable.app";
  const COOKIE_MAX_AGE = 60 * 60 * 24 * 365;

  function setCookie(value) {
    document.cookie = [
      `${COOKIE_NAME}=${encodeURIComponent(value)}`,
      `domain=${COOKIE_DOMAIN}`,
      `path=/`,
      `max-age=${COOKIE_MAX_AGE}`,
      `SameSite=Lax`,
      `Secure`,
    ].join("; ");
  }
  function getCookie() {
    const match = document.cookie.match(new RegExp("(?:^|; )" + COOKIE_NAME + "=([^;]*)"));
    return match ? decodeURIComponent(match[1]) : null;
  }
  function removeCookie() {
    document.cookie = `${COOKIE_NAME}=; domain=${COOKIE_DOMAIN}; path=/; max-age=0`;
  }

  const cookieStorage = {
    getItem(key) { return key === COOKIE_NAME ? getCookie() : localStorage.getItem(key); },
    setItem(key, value) { if (key === COOKIE_NAME) { setCookie(value); } else { localStorage.setItem(key, value); } },
    removeItem(key) { if (key === COOKIE_NAME) { removeCookie(); } else { localStorage.removeItem(key); } },
  };

  // Load Supabase from CDN
  const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      storageKey: COOKIE_NAME,
      storage: cookieStorage,
      detectSessionInUrl: true,
    },
  });

  // Determine sign-up vs sign-in from URL path/query
  const params = new URLSearchParams(window.location.search);
  const planParam = params.get("plan");
  let isSignUp = window.location.pathname.endsWith("/sign-up") || params.get("mode") === "sign-up";

  const titleEl = document.getElementById("auth-title");
  const subtitleEl = document.getElementById("auth-subtitle");
  const submitBtn = document.getElementById("btn-submit");
  const toggleLink = document.getElementById("toggle-link");
  const toggleEl = document.getElementById("auth-toggle");
  const passwordInput = document.getElementById("input-password");
  const errorEl = document.getElementById("auth-error");
  const yearEl = document.getElementById("year");

  yearEl.textContent = new Date().getFullYear();

  function updateMode() {
    if (isSignUp) {
      titleEl.textContent = "Create your account";
      subtitleEl.textContent = "Create your workspace and start tracking AI citations.";
      submitBtn.textContent = "Create Account";
      toggleEl.innerHTML = `Already have an account? <a id="toggle-link">Sign in</a>`;
      passwordInput.setAttribute("autocomplete", "new-password");
    } else {
      titleEl.textContent = "Welcome back";
      subtitleEl.textContent = "Sign in to your Covable dashboard.";
      submitBtn.textContent = "Sign In";
      toggleEl.innerHTML = `Don't have an account? <a id="toggle-link">Sign up</a>`;
      passwordInput.setAttribute("autocomplete", "current-password");
    }
    document.getElementById("toggle-link").addEventListener("click", () => {
      isSignUp = !isSignUp;
      errorEl.style.display = "none";
      updateMode();
      const url = new URL(window.location.href);
      url.searchParams.set("mode", isSignUp ? "sign-up" : "sign-in");
      history.replaceState({}, "", url.toString());
    });
  }
  updateMode();

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = "block";
  }
  function clearError() { errorEl.style.display = "none"; }

  function setLoading(btn, loading, label) {
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner${btn === document.getElementById('btn-submit') ? '' : ' spinner-white'}"></span>` : label;
  }

  function redirectHome(session) {
    const base = planParam ? `${HOME_URL}?plan=${planParam}` : HOME_URL;
    const hash = `access_token=${session.access_token}&refresh_token=${session.refresh_token}&type=magiclink`;
    window.location.href = `${base}#${hash}`;
  }

  // If already signed in, redirect to home
  const { data: { session: existingSession } } = await supabase.auth.getSession();
  if (existingSession) {
    redirectHome(existingSession);
  }

  // Email/password form
  document.getElementById("auth-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearError();
    const email = document.getElementById("input-email").value.trim();
    const password = document.getElementById("input-password").value;
    const btn = document.getElementById("btn-submit");
    const label = isSignUp ? "Create Account" : "Sign In";
    setLoading(btn, true, label);
    try {
      if (isSignUp) {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) throw new Error(error.message);
        if (data.session) {
          redirectHome(data.session);
        } else {
          // Email confirmation required
          btn.disabled = false;
          btn.textContent = label;
          showError("Check your email for a confirmation link.");
        }
      } else {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw new Error(error.message);
        redirectHome(data.session);
      }
    } catch (err) {
      showError(err.message || "Authentication failed");
      setLoading(btn, false, label);
    }
  });

  // Google OAuth
  document.getElementById("btn-google").addEventListener("click", async () => {
    clearError();
    const btn = document.getElementById("btn-google");
    setLoading(btn, true, "Continue with Google");
    try {
      // Redirect back to /auth so detectSessionInUrl can forward token to home
      const redirectTo = `${window.location.origin}/auth${window.location.search}`;
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo },
      });
      if (error) throw new Error(error.message);
    } catch (err) {
      showError(err.message || "Google sign-in failed");
      setLoading(btn, false, `<svg viewBox="0 0 24 24" width="16" height="16"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google`);
    }
  });
</script>

</body>
</html>
